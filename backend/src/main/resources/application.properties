server.port=8081
#servidor de entrada alternativo

spring.application.name=jusce-backend
spring.sql.init.mode=never

#informações de conexão com o banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/jusce_espindula?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Resolve erro da api encerrar sozinha ao iniciar depois da primeira vez
spring.sql.init.continue-on-error=true

# Mostra os comandos SQL que o Hibernate está rodando por baixo dos panos
spring.jpa.show-sql=true

# Faz com que o Hibernate crie ou atualize as tabelas automaticamente com base nas suas classes
spring.jpa.hibernate.ddl-auto=validate
server.error.include-message=always

# JWT 
app.jwt.secret=${JWT_SECRET:SuaChaveSuperSecretaDeNoMinimo32Caracteres2026}
app.jwt.expiration-ms=86400000 
# Upload de arquivos (Req 3/8) 
spring.servlet.multipart.enabled=true 
spring.servlet.multipart.max-file-size=10MB 
spring.servlet.multipart.max-request-size=12MB 
app.upload.dir=uploads 

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# CORS — trocar pelo domínio real em produção 
app.cors.allowed-origin=https://www.jusceconfeitaria.com.br