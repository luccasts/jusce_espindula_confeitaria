<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Jusce Confeitaria</title>

  <link href="https://cdn.lineicons.com/5.0/lineicons.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="shortcut icon" href="images/logo_jusce_png.png" type="image/x-icon">

  <style>
    body { background: #fdf6f0; }

    .admin-login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 0;
      background: none;
    }

    /* ===== PAINEL ESQUERDO ===== */
    .login-left {
      background: linear-gradient(160deg, #7a3e2c 0%, #4e2318 60%, #3a1810 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
      position: relative;
      overflow: hidden;
    }

    .login-left::before {
      content: '';
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1.5px solid rgba(252,200,200,0.12);
      top: -80px;
      left: -80px;
    }

    .login-left::after {
      content: '';
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 1.5px solid rgba(252,200,200,0.1);
      bottom: -60px;
      right: -60px;
    }

    .deco-circle-inner {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 1px solid rgba(252,200,200,0.08);
      top: 60px;
      left: 60px;
      pointer-events: none;
    }

    .deco-dots {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle, rgba(252,200,200,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .login-brand {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .login-brand-logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .login-brand-logo img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      filter: brightness(0) invert(1) opacity(0.9);
    }

    .login-brand h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .login-brand p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.4px;
      margin-bottom: 48px;
    }

    .deco-items {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 260px;
    }

    .deco-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 18px;
    }

    .deco-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(242,184,181,0.2);
      border: 1px solid rgba(242,184,181,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .deco-item-icon i {
      font-size: 16px;
      color: #f2b8b5;
    }

    .deco-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 2px;
    }

    .deco-item-text span {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* ===== PAINEL DIREITO ===== */
    .login-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
      background: #fdf6f0;
      position: relative;
      overflow: hidden;
    }

    .login-ornament {
      position: absolute;
      top: -20px;
      right: -20px;
      width: 180px;
      opacity: 0.07;
      pointer-events: none;
    }

    .login-ornament-bottom {
      position: absolute;
      bottom: -20px;
      left: -20px;
      width: 150px;
      opacity: 0.05;
      pointer-events: none;
      transform: rotate(180deg);
    }

    .login-form-wrapper {
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.7s ease both;
    }

    .login-form-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(122,62,44,0.09);
      color: #7a3e2c;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 18px;
      font-family: 'DM Sans', sans-serif;
    }

    .login-badge i { font-size: 11px; }

    .login-form-header h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 30px;
      font-weight: 700;
      color: #4e2318;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .login-form-header p {
      font-size: 14px;
      color: #bbb;
    }

    .divider-ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .divider-ornament::before,
    .divider-ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(122,62,44,0.2), transparent);
    }

    .divider-ornament span {
      font-size: 14px;
      color: #f2b8b5;
    }

    /* Campos */
    .input-group { position: relative; margin-bottom: 18px; }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #7a3e2c;
      margin-bottom: 8px;
      font-family: 'DM Sans', sans-serif;
    }

    .input-group i.field-icon {
      position: absolute;
      left: 16px;
      bottom: 14px;
      color: #c4967a;
      font-size: 15px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 44px;
      border-radius: 14px;
      border: 1.5px solid #e8ddd8;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: #fff;
      color: #4e2318;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      border-color: #7a3e2c;
      box-shadow: 0 0 0 4px rgba(122,62,44,0.09);
    }

    .input-group input::placeholder { color: #ccc; }

    .toggle-password {
      position: absolute;
      right: 16px;
      bottom: 14px;
      cursor: pointer;
      color: #c4967a;
      font-size: 15px;
      transition: color 0.2s;
    }

    .toggle-password:hover { color: #7a3e2c; }

    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7a3e2c 0%, #4e2318 100%);
      color: white;
      font-weight: 600;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.35s ease;
      letter-spacing: 0.4px;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(78,35,24,0.35);
    }

    .btn-login:active { transform: translateY(0); }

    .login-form-footer {
      text-align: center;
      margin-top: 28px;
    }

    .login-form-footer a {
      font-size: 13px;
      color: #7a3e2c;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      opacity: 0.65;
      transition: opacity 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .login-form-footer a:hover { opacity: 1; }

    .erro-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #c0392b;
      font-weight: 500;
      text-align: center;
      background: rgba(192,57,43,0.06);
      border-radius: 10px;
      padding: 10px 16px;
    }

    /* ===== BOTÃO VOLTAR FIXO ===== */
    .btn-voltar {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 50;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(122,62,44,0.15);
      border-radius: 50px;
      padding: 8px 16px 8px 12px;
      font-size: 13px;
      color: #7a3e2c;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: all 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .btn-voltar:hover {
      background: rgba(255,255,255,0.95);
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 820px) {
      .admin-login-page {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .login-left {
        padding: 60px 32px 44px;
        min-height: 280px;
      }

      .login-brand-logo { width: 80px; height: 80px; }
      .login-brand-logo img { width: 50px; height: 50px; }
      .login-brand h1 { font-size: 22px; }
      .login-brand p { margin-bottom: 24px; }

      .deco-items {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        max-width: 100%;
      }

      .deco-item {
        flex: 1;
        min-width: 130px;
        padding: 10px 14px;
      }

      .login-right { padding: 48px 28px 56px; }
    }

    @media (max-width: 480px) {
      .deco-items { display: none; }
      .login-brand p { display: none; }
      .login-right { padding: 36px 20px 48px; }
      .login-form-header h2 { font-size: 24px; }
    }
  </style>
</head>

<body>

<a class="btn-voltar" href="index.html">
  <i class="lni lni-arrow-left" style="font-size:14px;"></i>
  Voltar ao site
</a>

<main class="admin-login-page">

  <!-- PAINEL ESQUERDO — decorativo -->
  <div class="login-left">
    <div class="deco-dots"></div>
    <div class="deco-circle-inner"></div>

    <div class="login-brand">
      <div class="login-brand-logo">
        <img src="images/logo_jusce_png.png" alt="Logo Jusce">
      </div>
      <h1>Jusce Confeitaria</h1>
      <p>Painel de Gerenciamento</p>

      <div class="deco-items">
        <div class="deco-item">
          <div class="deco-item-icon">
            <i class="lni lni-cake"></i>
          </div>
          <div class="deco-item-text">
            <strong>Produtos</strong>
            <span>Gerencie o cardápio</span>
          </div>
        </div>

        <div class="deco-item">
          <div class="deco-item-icon">
            <i class="lni lni-clipboard"></i>
          </div>
          <div class="deco-item-text">
            <strong>Pedidos</strong>
            <span>Acompanhe encomendas</span>
          </div>
        </div>

        <div class="deco-item">
          <div class="deco-item-icon">
            <i class="lni lni-image"></i>
          </div>
          <div class="deco-item-text">
            <strong>Galeria</strong>
            <span>Fotos dos bolos</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAINEL DIREITO — formulário -->
  <div class="login-right">

    <!-- Ornamentos decorativos -->
    <svg class="login-ornament" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" stroke="#7a3e2c" stroke-width="1.5"/>
      <circle cx="100" cy="100" r="70" stroke="#7a3e2c" stroke-width="0.8"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(72 100 100)"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(144 100 100)"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(216 100 100)"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(288 100 100)"/>
    </svg>

    <svg class="login-ornament-bottom" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" stroke="#7a3e2c" stroke-width="1.5"/>
      <circle cx="100" cy="100" r="70" stroke="#7a3e2c" stroke-width="0.8"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(72 100 100)"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(144 100 100)"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(216 100 100)"/>
      <path d="M100 5 Q130 50 100 100 Q70 50 100 5Z" fill="#7a3e2c" transform="rotate(288 100 100)"/>
    </svg>

    <div class="login-form-wrapper">

      <div class="login-form-header">
        <div class="login-badge">
          <i class="lni lni-lock-alt"></i>
          Acesso restrito
        </div>
        <h2>Bem-vinda de volta</h2>
        <p>Entre com suas credenciais para continuar</p>
      </div>

      <div class="divider-ornament">
        <span>✦</span>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <label class="input-label">Usuário</label>
          <i class="lni lni-user field-icon"></i>
          <input type="text" id="usuario" placeholder="Seu usuário" required>
        </div>

        <div class="input-group">
          <label class="input-label">Senha</label>
          <i class="lni lni-lock field-icon"></i>
          <input type="password" id="senha" placeholder="Sua senha" required>
          <span class="toggle-password" id="togglePassword">
            <i class="lni lni-eye"></i>
          </span>
        </div>

        <button type="submit" class="btn-login">Entrar no Painel</button>
      </form>

      <p id="erro" class="erro-msg"></p>

      <div class="login-form-footer">
        <a href="index.html">
          <i class="lni lni-home"></i>
          Voltar para o site
        </a>
      </div>

    </div>
  </div>

</main>

<script src="js/script.js"></script>
</body>
</html>
